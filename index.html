<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSR HPR Risk Control Platform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, 'Times New Roman', serif; background: #f0f2f5; }
    #root { min-height: 100vh; }

    /* Mobile sidebar hide */
    @media (max-width: 768px) {
      .desktop-sidebar { display: none !important; }
      .mobile-header { display: flex !important; }
    }
    @media (min-width: 769px) {
      .desktop-sidebar { display: flex !important; }
      .mobile-header { display: none !important; }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e3a5f; }
    ::-webkit-scrollbar-thumb { background: #c9a84c; border-radius: 3px; }

    /* Select arrow */
    select { appearance: auto; }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0c1a2e;flex-direction:column;gap:16px;">
      <div style="color:#c9a84c;font-size:14px;font-family:Georgia,serif;letter-spacing:2px;">NSR RISK CONTROL</div>
      <div style="color:#fff;font-size:20px;font-family:Georgia,serif;">Loading Platform...</div>
      <div style="width:200px;height:4px;background:#1e3a5f;border-radius:2px;overflow:hidden;">
        <div style="width:60%;height:100%;background:#c9a84c;border-radius:2px;animation:load 1s ease infinite alternate;" id="loadbar"></div>
      </div>
    </div>
  </div>

  <style>
    @keyframes load { from { width: 20%; } to { width: 90%; } }
  </style>

  <script type="text/babel" src="hpr-plastics.jsx" data-presets="react"></script>

  <script>
    // Wait for component to load then render
    function tryRender() {
      if (typeof HPRApp !== 'undefined') {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(HPRApp));
      } else {
        setTimeout(tryRender, 100);
      }
    }
    // Give Babel time to compile
    setTimeout(tryRender, 500);
  </script>
</body>
</html>
